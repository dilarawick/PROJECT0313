<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting Form</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Get Your Greeting</h1>
        <form action="/greet" method="POST" class="greeting-form">
            <label for="username" class="label">Enter your name:</label>
            <input type="text" id="username" name="username" class="input" placeholder="Your name" required>
            <button type="submit" class="button">Get Greeting</button>
        </form>
    </div>
</body>
</html>
